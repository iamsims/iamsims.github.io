[params]
showToc = true
TocOpen = false
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
hideMeta = false
env = "production"
hideDescriptionInList = false
defaultTheme = "light"

  [params.social]
  email = "simran.kc.official@gmail.com"
  linkedin = "https://www.linkedin.com/in/simran-kc"
  github = "https://github.com/iamsims"

  [params.profileMode]
  enabled = true
  title = "Simran KC"
  subtitle = """I am passionate about **ML systems and infrastructure**. By day I build ML infra and agentic systems: multi-agent LLM workflows, production model serving, and the pipelines that keep them alive.<br><br>The rest of the time I go deep on how the big players make inference fast at scale, and how to build that kind of infrastructure myself. I build it out in my [projects](/projects) and write about what I learn on my [blog](/blog).<br><br><small>Python · C++ · CUDA · PyTorch · FastAPI · Redis · Docker · AWS · Nsight Compute/Systems</small><br><small>MS Computer Science, 4.0 GPA - University of Alabama in Huntsville, August 2026</small>"""
  imageUrl = "home/my-pic.jpg"
  imageWidth = 220
  imageHeight = 220

  [params.cover]
  hiddenInList = false
  hiddenInSingle = false

  [[params.socialIcons]]
  name = "email"
  url = "mailto:simran.kc.official@gmail.com"

  [[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/simran-kc"

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/iamsims"

  [[params.socialIcons]]
  name = "cv"
  url = "/resume.pdf"

  [params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1_000
  threshold = 0.4
  minMatchCharLength = 0
  keys = [ "title", "permalink", "summary", "content" ]

[outputs]
home = [ "HTML", "RSS", "JSON" ]

[markup.goldmark.renderer]
unsafe = true
